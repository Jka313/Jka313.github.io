<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساباتي - جوهر الأناقة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(136, 18, 241, 0.1);
            text-align: center;
            width: 380px;
            border: 1px solid #eee;
        }
        .logo {
            width: 140px;
            margin-bottom: 1.5rem;
        }
        h1 {
            color: #8812f1; /* نفس درجة اللون الأرجواني في تطبيقك */
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        p {
            color: #555;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }
        .btn {
            background-color: #8812f1;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 30px;
            display: block;
            transition: 0.4s ease;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .btn:hover {
            background-color: #6a0bc4;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(136, 18, 241, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.png" alt="جوهر الأناقة" class="logo">
        <h1>نظام حساباتي</h1>
        <p>إدارة مصروفات فروع شركة جوهر الأناقة</p>
        
        <a href="https://www.appsheet.com/start/d58f79b7-20b4-40dd-bfa8-45cae8b54a89" class="btn">دخول النظام</a>
    </div>
</body>
</html>
