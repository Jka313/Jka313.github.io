<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساباتي - جوهر الأناقة</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* واجهة الدخول المبدئية */
        #login-screen {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #f8f9fa;
        }
        .card {
            background: white; padding: 2.5rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(136, 18, 241, 0.1);
            text-align: center; width: 380px; border: 1px solid #eee;
        }
        .logo { width: 140px; margin-bottom: 1.5rem; }
        h1 { color: #8812f1; margin-bottom: 0.5rem; }
        .btn {
            background-color: #8812f1; color: white; padding: 15px 30px;
            text-decoration: none; border-radius: 30px; display: block;
            font-weight: bold; cursor: pointer; border: none; width: 100%;
        }
        /* إطار البرنامج المخفي */
        #app-frame {
            display: none; width: 100%; height: 100vh; border: none;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <img src="logo.png" alt="جوهر الأناقة" class="logo">
            <h1>نظام حساباتي</h1>
            <p>شركة جوهر الأناقة - فروع الجنوب</p>
            <button onclick="openApp()" class="btn">دخول النظام</button>
        </div>
    </div>

    <iframe id="app-frame" src="https://www.appsheet.com/start/d58f79b7-20b4-40dd-bfa8-45cae8b54a89"></iframe>

    <script>
        function openApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-frame').style.display = 'block';
        }
    </script>
</body>
</html>
