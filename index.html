<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>سيد محمد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a2a4a 0%,#1a5080 40%,#2e8bc0 80%,#5bb8f5 100%);overflow-x:hidden;}
.container{max-width:920px;margin:0 auto;padding:30px 18px 60px;position:relative;z-index:1;}

/* HEADER */
.header{text-align:center;margin-bottom:30px;}
.hero-wrap{position:relative;display:inline-block;margin-bottom:10px;}
.spin-ring{position:absolute;inset:-6px;border-radius:50%;background:conic-gradient(#f5c842,#5bb8f5,#c9922a,#1a6fa8,#f5c842);animation:spin 3s linear infinite;z-index:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.hero-svg{position:relative;z-index:1;border-radius:50%;border:4px solid #f0f6ff;display:block;}
.badge{display:inline-block;background:linear-gradient(90deg,#c9922a,#f5c842,#c9922a);color:#1a2a00;font-size:11px;font-weight:900;padding:3px 16px;border-radius:20px;margin-bottom:6px;letter-spacing:1px;}
.header h1{font-family:‘Tajawal’,sans-serif;font-size:2.2rem;font-weight:900;color:#f0f6ff;}
.header p{color:rgba(200,230,255,0.8);font-size:0.95rem;margin-top:4px;}

/* اسم السيد وأصحابه تحت العنوان */
.friends-box{background:linear-gradient(135deg,rgba(245,200,66,0.13),rgba(91,184,245,0.10));border:2px solid rgba(245,200,66,0.4);border-radius:18px;padding:18px 22px;margin-bottom:28px;position:relative;overflow:hidden;}
.friends-box::before{content:‘✨’;position:absolute;top:10px;right:14px;font-size:1.2rem;opacity:0.5;}
.friends-box::after{content:‘✨’;position:absolute;bottom:10px;left:14px;font-size:1.2rem;opacity:0.5;}
.friends-title{font-family:‘Tajawal’,sans-serif;font-size:1rem;font-weight:800;color:#f5c842;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.friends-list{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.friend-chip{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.18);border-radius:30px;padding:7px 16px;display:flex;align-items:center;gap:8px;transition:transform 0.2s,border-color 0.2s;cursor:default;}
.friend-chip:hover{transform:translateY(-2px);border-color:rgba(245,200,66,0.5);}
.friend-chip .fc-emoji{font-size:1.1rem;}
.friend-chip .fc-name{font-family:‘Tajawal’,sans-serif;font-size:0.85rem;font-weight:700;color:#f0f6ff;}
.friend-chip .fc-role{font-size:0.7rem;color:rgba(180,210,255,0.6);}

/* TOTAL */
.total-card{background:rgba(245,200,66,0.12);border:1.5px solid rgba(245,200,66,0.35);border-radius:18px;padding:18px 28px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px);}
.total-label{color:rgba(200,230,255,0.75);font-size:0.9rem;}
.total-amount{font-family:‘Tajawal’,sans-serif;font-size:1.7rem;font-weight:900;color:#f5c842;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;margin-bottom:28px;}
.card{background:rgba(255,255,255,0.09);border:1.5px solid rgba(255,255,255,0.2);border-radius:18px;padding:20px 16px 14px;cursor:pointer;backdrop-filter:blur(10px);transition:transform 0.2s,border-color 0.2s;position:relative;overflow:hidden;}
.card::before{content:’’;position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#5bb8f5,#f5c842,#5bb8f5);}
.card:hover{transform:translateY(-4px);border-color:rgba(245,200,66,0.5);}
.card.new-card{border-color:rgba(92,245,160,0.5);}
.card.new-card::before{background:linear-gradient(90deg,#5cf5a0,#5bb8f5,#5cf5a0);}
.card.unknown{opacity:0.75;border-style:dashed;}
.c-emoji{font-size:1.6rem;margin-bottom:8px;}
.c-name{font-family:‘Tajawal’,sans-serif;font-size:1rem;font-weight:800;color:#f0f6ff;margin-bottom:3px;}
.c-role{font-size:0.76rem;color:rgba(180,210,255,0.65);margin-bottom:10px;}
.c-amount{font-size:0.88rem;font-weight:700;color:#f5c842;background:rgba(245,200,66,0.1);border-radius:8px;padding:3px 10px;display:inline-block;}
.c-hint{font-size:0.7rem;color:rgba(180,210,255,0.4);margin-top:7px;text-align:left;}
.dot{width:8px;height:8px;border-radius:50%;background:#ff5c5c;display:inline-block;margin-left:5px;animation:pulse 1.5s infinite;}
.dot.partial{background:#f5c842;}
.dot.new{background:#5cf5a0;}
@keyframes pulse{0%,100%{transform:scale(1);}50
