<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساباتي - جوهر الأناقة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        .logo {
            width: 120px;
            margin-bottom: 1rem;
        }
        h1 {
            color: #6a1b9a; /* لون أرجواني متناسق مع اللوجو */
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: #6a1b9a;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            display: block;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #4a148c;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/120x150?text=JA" alt="جوهر الأناقة" class="logo">
        <h1>برنامج حساباتي</h1>
        <p>نظام إدارة المصروفات - شركة جوهر الأناقة</p>
        <a href="رابط_تطبيق_أب_شيت_الخاص_بك" class="btn">دخول النظام</a>
    </div>
</body>
</html>
